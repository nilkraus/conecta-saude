<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Pacientes | Conecta Saúde</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo">
    <div class="container">
      <h1>Conecta Saúde</h1>
      <p>Portal de cadastro e horários médicos da Clínica Bem-Estar</p>

      <nav aria-label="Menu principal">
        <a href="cadastro.html">Cadastro</a>
        <a href="horarios.html">Horários</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Cadastro de Novo Paciente</h2>
      <p class="texto-apoio">Campos marcados com * são obrigatórios.</p>

      <form action="#" method="post">
        <fieldset>
          <legend>Dados pessoais</legend>

          <label for="nome">Nome completo *</label>
          <input type="text" id="nome" name="nome" required minlength="3" maxlength="100" placeholder="Digite seu nome completo">

          <label for="nascimento">Data de nascimento *</label>
          <input type="date" id="nascimento" name="nascimento" required>

          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" name="cpf" required pattern="[0-9]{11}" maxlength="11" placeholder="Somente números">
        </fieldset>

        <fieldset>
          <legend>Contato</legend>

          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required placeholder="exemplo@email.com">

          <label for="telefone">Telefone *</label>
          <input type="tel" id="telefone" name="telefone" required pattern="[0-9]{10,11}" placeholder="DDD + número">
        </fieldset>

        <fieldset>
          <legend>Informações para atendimento</legend>

          <label for="especialidade">Especialidade desejada *</label>
          <select id="especialidade" name="especialidade" required>
            <option value="">Selecione uma especialidade</option>
            <option value="clinico">Clínico Geral</option>
            <option value="cardiologia">Cardiologia</option>
            <option value="pediatria">Pediatria</option>
            <option value="dermatologia">Dermatologia</option>
          </select>

          <label for="observacoes">Observações médicas</label>
          <textarea id="observacoes" name="observacoes" rows="5" placeholder="Informe alergias, sintomas ou necessidades especiais"></textarea>
        </fieldset>

        <button type="submit">Cadastrar paciente</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Clínica Bem-Estar | Projeto Conecta Saúde</p>
  </footer>
</body>
</html>
